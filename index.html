<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardevoir ex - Pro Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-gray-800 pb-12 relative">

    <div id="visual-modal" class="fixed inset-0 bg-fuchsia-950/90 backdrop-blur-md z-[100] hidden items-center justify-center transition-opacity" onclick="closeModal()">
        <div class="bg-white p-10 rounded-3xl shadow-[0_0_50px_rgba(192,38,211,0.5)] text-center transform scale-110 border-4 border-fuchsia-300 flex flex-col items-center min-w-[320px]" id="modal-content" onclick="event.stopPropagation()">
            </div>
    </div>

    <header class="bg-gradient-to-r from-fuchsia-700 to-fuchsia-500 text-white p-4 shadow-lg sticky top-0 z-50 border-b-4 border-fuchsia-300">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/282.png" alt="Gardevoir" class="w-12 h-12 drop-shadow-md">
                <h1 class="text-2xl font-black tracking-wide">Gardevoir <span class="text-fuchsia-200 font-light">Tracker</span></h1>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-2 md:gap-4">
                <div class="flex gap-2 bg-white/20 p-1 rounded-lg backdrop-blur-sm shadow-inner">
                    <button onclick="flipCoin()" class="hover:bg-white/30 px-3 py-1 rounded text-sm font-bold transition-colors">🪙 Moneda</button>
                    <button onclick="rollDice()" class="hover:bg-white/30 px-3 py-1 rounded text-sm font-bold transition-colors border-l border-white/30">🎲 Dado</button>
                </div>

                <div class="flex items-center gap-2 bg-fuchsia-900/50 p-2 rounded-xl border border-fuchsia-400/50 backdrop-blur-sm shadow-inner">
                    <span class="text-xl font-mono font-bold w-16 text-center" id="timer-display">50:00</span>
                    <button onclick="startTimer()" class="bg-green-400 hover:bg-green-300 text-green-900 px-2 py-1 rounded text-sm font-bold shadow">▶</button>
                    <button onclick="pauseTimer()" class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-2 py-1 rounded text-sm font-bold shadow">⏸</button>
                    <button onclick="resetTimer()" class="bg-red-400 hover:bg-red-300 text-red-900 px-2 py-1 rounded text-sm font-bold shadow">⏹</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 flex flex-col gap-6">
            <div class="glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100">
                <div class="bg-fuchsia-100 text-fuchsia-800 text-xs font-bold px-3 py-1 rounded-full w-fit mb-4">MI MAZO: GARDEVOIR EX</div>
                <h2 class="text-2xl font-black mb-4 text-fuchsia-900">Nueva Partida</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-600">¿Contra qué jugaste?</label>
                    <select id="opp-deck" class="w-full border-2 border-fuchsia-200 rounded-xl p-2 bg-white font-bold text-fuchsia-900 focus:outline-none focus:border-fuchsia-500"></select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-600">¿Quién empezó?</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-turn-1" onclick="setTurn(1)" class="py-2 rounded-xl border-2 border-fuchsia-500 bg-fuchsia-500 text-white font-bold transition-colors">Fui 1º</button>
                        <button id="btn-turn-2" onclick="setTurn(2)" class="py-2 rounded-xl border-2 border-fuchsia-200 bg-white text-fuchsia-500 font-bold transition-colors">Fui 2º</button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-600">Notas (Opcional)</label>
                    <input type="text" id="match-notes" placeholder="Ej: Prizeé 2 Kirlia, mala mano..." class="w-full border-2 border-fuchsia-200 rounded-xl p-2 bg-white text-sm focus:outline-none focus:border-fuchsia-500">
                </div>

                <label class="block text-sm font-bold mb-1 text-gray-600">Resultado Final</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="addMatch('W')" class="bg-green-100 hover:bg-green-500 hover:text-white border border-green-300 text-green-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">WIN</button>
                    <button onclick="addMatch('L')" class="bg-red-100 hover:bg-red-500 hover:text-white border border-red-300 text-red-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">LOSS</button>
                    <button onclick="addMatch('T')" class="bg-gray-100 hover:bg-gray-500 hover:text-white border border-gray-300 text-gray-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">TIE</button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-fuchsia-900">Historial Reciente</h2>
                    <button onclick="clearHistory()" class="text-red-400 hover:text-red-600 text-xs font-bold underline">Borrar Todo</button>
                </div>
                <div id="recent-history" class="flex flex-col gap-3 max-h-80 overflow-y-auto no-scrollbar pr-1">
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100 mb-8 bg-gradient-to-br from-white to-fuchsia-50">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-center md:text-left">
                        <h2 class="text-3xl font-black text-fuchsia-900">Rendimiento Total</h2>
                        <p class="text-fuchsia-600/80 font-bold mt-1" id="total-matches-text">0 partidas registradas</p>
                    </div>
                    <div class="text-center md:text-right">
                        <p class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 to-purple-600" id="global-winrate">0%</p>
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mt-1">Winrate Global</p>
                    </div>
                </div>
                
                <div class="h-px bg-fuchsia-200 my-4"></div>
                
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-white/60 p-3 rounded-xl border border-fuchsia-100">
                        <p class="text-xs font-bold text-gray-500 uppercase">Yendo 1º</p>
                        <p class="text-2xl font-black text-fuchsia-800" id="winrate-first">0%</p>
                        <p class="text-xs text-gray-400" id="matches-first">0 partidas</p>
                    </div>
                    <div class="bg-white/60 p-3 rounded-xl border border-fuchsia-100">
                        <p class="text-xs font-bold text-gray-500 uppercase">Yendo 2º</p>
                        <p class="text-2xl font-black text-fuchsia-800" id="winrate-second">0%</p>
                        <p class="text-xs text-gray-400" id="matches-second">0 partidas</p>
                    </div>
                </div>
            </div>

            <h3 class="text-2xl font-black mb-6 text-fuchsia-900 flex items-center gap-2">
                <svg class="w-6 h-6 text-fuchsia-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Análisis por Matchup
            </h3>
            
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
