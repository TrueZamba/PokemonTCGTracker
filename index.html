<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardevoir ex - Pro Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { 
            background-color: #fdf4ff; 
            background-image: radial-gradient(#f0abfc 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Nunito', sans-serif; 
        }
        .deck-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .deck-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(192, 38, 211, 0.3); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Ocultar barra de desplazamiento en el historial pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 pb-12">

    <header class="bg-gradient-to-r from-fuchsia-700 to-fuchsia-500 text-white p-4 shadow-lg sticky top-0 z-50 border-b-4 border-fuchsia-300">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/282.png" alt="Gardevoir" class="w-12 h-12 drop-shadow-md">
                <h1 class="text-2xl font-black tracking-wide">Gardevoir <span class="text-fuchsia-200 font-light">Tracker</span></h1>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-2 md:gap-4">
                <div class="flex gap-2 bg-white/20 p-1 rounded-lg backdrop-blur-sm">
                    <button onclick="flipCoin()" class="hover:bg-white/30 px-3 py-1 rounded text-sm font-bold transition-colors">🪙 Moneda</button>
                    <button onclick="rollDice()" class="hover:bg-white/30 px-3 py-1 rounded text-sm font-bold transition-colors border-l border-white/30">🎲 Dado</button>
                </div>

                <div class="flex items-center gap-2 bg-fuchsia-900/50 p-2 rounded-xl border border-fuchsia-400/50 backdrop-blur-sm shadow-inner">
                    <span class="text-xl font-mono font-bold w-16 text-center" id="timer-display">50:00</span>
                    <button onclick="startTimer()" class="bg-green-400 hover:bg-green-300 text-green-900 px-2 py-1 rounded text-sm font-bold shadow">▶</button>
                    <button onclick="pauseTimer()" class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-2 py-1 rounded text-sm font-bold shadow">⏸</button>
                    <button onclick="resetTimer()" class="bg-red-400 hover:bg-red-300 text-red-900 px-2 py-1 rounded text-sm font-bold shadow">⏹</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 flex flex-col gap-6">
            
            <div class="glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100">
                <div class="bg-fuchsia-100 text-fuchsia-800 text-xs font-bold px-3 py-1 rounded-full w-fit mb-4">MI MAZO: GARDEVOIR EX</div>
                <h2 class="text-2xl font-black mb-4 text-fuchsia-900">Nueva Partida</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-600">¿Contra qué jugaste?</label>
                    <select id="opp-deck" class="w-full border-2 border-fuchsia-200 rounded-xl p-2 bg-white font-bold text-fuchsia-900 focus:outline-none focus:border-fuchsia-500"></select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-600">¿Quién empezó?</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-turn-1" onclick="setTurn(1)" class="py-2 rounded-xl border-2 border-fuchsia-500 bg-fuchsia-500 text-white font-bold transition-colors">Fui 1º</button>
                        <button id="btn-turn-2" onclick="setTurn(2)" class="py-2 rounded-xl border-2 border-fuchsia-200 bg-white text-fuchsia-500 font-bold transition-colors">Fui 2º</button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-600">Notas (Opcional)</label>
                    <input type="text" id="match-notes" placeholder="Ej: Prizeé 2 Kirlia, mala mano..." class="w-full border-2 border-fuchsia-200 rounded-xl p-2 bg-white text-sm focus:outline-none focus:border-fuchsia-500">
                </div>

                <label class="block text-sm font-bold mb-1 text-gray-600">Resultado Final</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="addMatch('W')" class="bg-green-100 hover:bg-green-500 hover:text-white border border-green-300 text-green-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">WIN</button>
                    <button onclick="addMatch('L')" class="bg-red-100 hover:bg-red-500 hover:text-white border border-red-300 text-red-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">LOSS</button>
                    <button onclick="addMatch('T')" class="bg-gray-100 hover:bg-gray-500 hover:text-white border border-gray-300 text-gray-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">TIE</button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-fuchsia-900">Historial Reciente</h2>
                    <button onclick="clearHistory()" class="text-red-400 hover:text-red-600 text-xs font-bold underline">Borrar Todo</button>
                </div>
                <div id="recent-history" class="flex flex-col gap-3 max-h-80 overflow-y-auto no-scrollbar pr-1">
                    </div>
            </div>

        </div>

        <div class="lg:col-span-2">
            
            <div class="glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100 mb-8 bg-gradient-to-br from-white to-fuchsia-50">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-center md:text-left">
                        <h2 class="text-3xl font-black text-fuchsia-900">Rendimiento Total</h2>
                        <p class="text-fuchsia-600/80 font-bold mt-1" id="total-matches-text">0 partidas registradas</p>
                    </div>
                    <div class="text-center md:text-right">
                        <p class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 to-purple-600" id="global-winrate">0%</p>
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mt-1">Winrate Global</p>
                    </div>
                </div>
                
                <div class="h-px bg-fuchsia-200 my-4"></div>
                
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-white/60 p-3 rounded-xl border border-fuchsia-100">
                        <p class="text-xs font-bold text-gray-500 uppercase">Yendo 1º</p>
                        <p class="text-2xl font-black text-fuchsia-800" id="winrate-first">0%</p>
                        <p class="text-xs text-gray-400" id="matches-first">0 partidas</p>
                    </div>
                    <div class="bg-white/60 p-3 rounded-xl border border-fuchsia-100">
                        <p class="text-xs font-bold text-gray-500 uppercase">Yendo 2º</p>
                        <p class="text-2xl font-black text-fuchsia-800" id="winrate-second">0%</p>
                        <p class="text-xs text-gray-400" id="matches-second">0 partidas</p>
                    </div>
                </div>
            </div>

            <h3 class="text-2xl font-black mb-6 text-fuchsia-900 flex items-center gap-2">
                <svg class="w-6 h-6 text-fuchsia-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Análisis por Matchup
            </h3>
            
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                </div>
        </div>
    </main>

    <script>
        const metaDecks = [
            { id: 'draga', name: 'Dragapult ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/887.png' },
            { id: 'garde', name: 'Gardevoir ex (Mirror)', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/282.png' },
            { id: 'grimmsnarl', name: "Marnie's Grimmsnarl ex", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/861.png' },
            { id: 'zoroark', name: "N's Zoroark ex", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/571.png' },
            { id: 'gholdengo', name: 'Gholdengo ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1000.png' },
            { id: 'froslass', name: 'Froslass Munkidori', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/478.png' },
            { id: 'absol', name: 'Mega Absol Box', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/359.png' },
            { id: 'crustle', name: 'Crustle / Rock Inn', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/558.png' },
            { id: 'zard', name: 'Charizard ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png' },
            { id: 'ragingbolt', name: 'Raging Bolt ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1021.png' },
            { id: 'joltik', name: 'Joltik Box', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/595.png' },
            { id: 'other', name: 'Otro / Rogue', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/132.png' }
        ];

        let matches = JSON.parse(localStorage.getItem('gardeMatchesPro')) || [];
        let currentTurn = 1; // 1 = Fui 1º, 2 = Fui 2º

        function init() {
            const oppDeckSelect = document.getElementById('opp-deck');
            metaDecks.forEach(deck => {
                oppDeckSelect.add(new Option(deck.name, deck.id));
            });
            updateUI();
        }

        // --- SISTEMA DE TURNOS ---
        function setTurn(turn) {
            currentTurn = turn;
            const btn1 = document.getElementById('btn-turn-1');
            const btn2 = document.getElementById('btn-turn-2');
            
            if(turn === 1) {
                btn1.className = "py-2 rounded-xl border-2 border-fuchsia-500 bg-fuchsia-500 text-white font-bold transition-colors";
                btn2.className = "py-2 rounded-xl border-2 border-fuchsia-200 bg-white text-fuchsia-500 font-bold transition-colors";
            } else {
                btn2.className = "py-2 rounded-xl border-2 border-fuchsia-500 bg-fuchsia-500 text-white font-bold transition-colors";
                btn1.className = "py-2 rounded-xl border-2 border-fuchsia-200 bg-white text-fuchsia-500 font-bold transition-colors";
            }
        }

        // --- GESTIÓN DE PARTIDAS ---
        function addMatch(result) {
            const oppDeck = document.getElementById('opp-deck').value;
            const notes = document.getElementById('match-notes').value;
            const id = Date.now(); // ID único para poder borrarla
            
            matches.push({ id, oppDeck, result, turn: currentTurn, notes, date: id });
            localStorage.setItem('gardeMatchesPro', JSON.stringify(matches));
            
            document.getElementById('match-notes').value = ""; // Limpiar notas
            updateUI();
        }

        function deleteMatch(id) {
            if(confirm('¿Borrar esta partida del historial?')) {
                matches = matches.filter(m => m.id !== id);
                localStorage.setItem('gardeMatchesPro', JSON.stringify(matches));
                updateUI();
            }
        }

        function clearHistory() {
            if(confirm('🚨 ¿Borrar TODAS las partidas? No se puede deshacer.')) {
                matches = [];
                localStorage.removeItem('gardeMatchesPro');
                updateUI();
            }
        }

        // --- HERRAMIENTAS VIRTUALES ---
        function flipCoin() {
            const result = Math.random() < 0.5 ? 'CARA 🧑' : 'CRUZ ❌';
            alert(`🪙 La moneda dice: ¡${result}!`);
        }

        function rollDice() {
            const result = Math.floor(Math.random() * 6) + 1;
            alert(`🎲 El dado ha sacado un: ${result}`);
        }

        // --- ACTUALIZACIÓN DE INTERFAZ ---
        function updateUI() {
            const totalMatches = matches.length;
            const totalWins = matches.filter(m => m.result === 'W').length;
            
            // Winrate Global
            const globalWinrate = totalMatches > 0 ? ((totalWins / totalMatches) * 100).toFixed(1) : 0;
            document.getElementById('global-winrate').innerText = globalWinrate + '%';
            document.getElementById('total-matches-text').innerText = `${totalMatches} partidas registradas`;

            // Winrate 1º vs 2º
            const matchesFirst = matches.filter(m => m.turn === 1);
            const matchesSecond = matches.filter(m => m.turn === 2);
            
            const wrFirst = matchesFirst.length > 0 ? ((matchesFirst.filter(m => m.result === 'W').length / matchesFirst.length) * 100).toFixed(1) : 0;
            const wrSecond = matchesSecond.length > 0 ? ((matchesSecond.filter(m => m.result === 'W').length / matchesSecond.length) * 100).toFixed(1) : 0;

            document.getElementById('winrate-first').innerText = wrFirst + '%';
            document.getElementById('matches-first').innerText = `${matchesFirst.length} partidas`;
            document.getElementById('winrate-second').innerText = wrSecond + '%';
            document.getElementById('matches-second').innerText = `${matchesSecond.length} partidas`;

            // Historial Reciente (últimas 15 partidas)
            const historyContainer = document.getElementById('recent-history');
            historyContainer.innerHTML = '';
            
            if (matches.length === 0) {
                historyContainer.innerHTML = '<p class="text-sm text-gray-400 italic text-center py-4">No hay partidas recientes.</p>';
            } else {
                const recentMatches = [...matches].reverse().slice(0, 15);
                recentMatches.forEach(m => {
                    const deckInfo = metaDecks.find(d => d.id === m.oppDeck) || { name: 'Desconocido' };
                    let resultColor = m.result === 'W' ? 'bg-green-100 text-green-700 border-green-300' : (m.result === 'L' ? 'bg-red-100 text-red-700 border-red-300' : 'bg-gray-100 text-gray-700 border-gray-300');
                    let turnText = m.turn === 1 ? '1º' : '2º';
                    
                    historyContainer.innerHTML += `
                        <div class="flex items-start gap-3 bg-white p-3 rounded-xl border border-fuchsia-100 shadow-sm relative group">
                            <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center font-black rounded-lg border ${resultColor}">
                                ${m.result}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold text-gray-800 truncate">vs ${deckInfo.name}</p>
                                <p class="text-xs text-fuchsia-600 font-bold mb-1">Fui ${turnText}</p>
                                ${m.notes ? `<p class="text-xs text-gray-500 italic truncate" title="${m.notes}">📝 ${m.notes}</p>` : ''}
                            </div>
                            <button onclick="deleteMatch(${m.id})" class="text-red-300 hover:text-red-600 p-2 transition-colors" title="Borrar partida">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                });
            }

            // Grid de Mazos (Desglose)
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';

            metaDecks.forEach(deck => {
                const deckMatches = matches.filter(m => m.oppDeck === deck.id);
                if (deckMatches.length === 0) return;

                const w = deckMatches.filter(m => m.result === 'W').length;
                const l = deckMatches.filter(m => m.result === 'L').length;
                const t = deckMatches.filter(m => m.result === 'T').length;
                const wr = ((w / deckMatches.length) * 100).toFixed(1);

                let wrColor = 'text-gray-500';
                let borderColor = 'border-gray-200';
                if(wr >= 55) { wrColor = 'text-green-500'; borderColor = 'border-green-400'; }
                else if (wr < 45) { wrColor = 'text-red-500'; borderColor = 'border-red-400'; }
                else { wrColor = 'text-yellow-500'; borderColor = 'border-yellow-400'; }

                const card = document.createElement('div');
                card.className = `deck-card glass-panel rounded-2xl shadow-md p-4 flex items-center gap-4 border-l-8 ${borderColor} relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="absolute -right-6 -bottom-6 opacity-10 w-32 h-32 bg-contain bg-no-repeat z-0" style="background-image: url('${deck.img}')"></div>
                    <img src="${deck.img}" alt="${deck.name}" class="w-20 h-20 object-contain bg-gradient-to-b from-white to-gray-100 rounded-full shadow-inner p-2 border border-gray-100 z-10 relative">
                    <div class="flex-1 z-10 relative">
                        <h4 class="font-black text-lg text-fuchsia-950 leading-tight">${deck.name}</h4>
                        <div class="flex gap-2 text-sm mt-2 bg-white/70 w-fit px-2 py-1 rounded-lg">
                            <span class="text-green-600 font-bold">${w}W</span>
                            <span class="text-red-600 font-bold">${l}L</span>
                            <span class="text-gray-500 font-bold">${t}T</span>
                        </div>
                    </div>
                    <div class="text-right z-10 relative">
                        <span class="block text-2xl font-black ${wrColor}">${wr}%</span>
                    </div>
                `;
                statsGrid.appendChild(card);
            });
        }

        // --- TEMPORIZADOR ---
        let timerSeconds = 50 * 60;
        let timerInterval = null;

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) {
                    timerSeconds--;
                    updateTimerDisplay();
                } else {
                    pauseTimer();
                    alert("¡TIEMPO CUMPLIDO! Inicia el Turno 0.");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            pauseTimer();
            timerSeconds = 50 * 60;
            updateTimerDisplay();
        }

        window.onload = init;
    </script>
</body>
</html>
