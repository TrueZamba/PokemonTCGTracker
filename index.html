<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardevoir ex - TCG Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { 
            background-color: #fdf4ff; /* Fucsia muy claro */
            background-image: radial-gradient(#f0abfc 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Nunito', sans-serif; 
        }
        .deck-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .deck-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(192, 38, 211, 0.3); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800 pb-12">

    <header class="bg-gradient-to-r from-fuchsia-700 to-fuchsia-500 text-white p-4 shadow-lg sticky top-0 z-50 border-b-4 border-fuchsia-300">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/282.png" alt="Gardevoir" class="w-12 h-12 drop-shadow-md">
                <h1 class="text-2xl font-black tracking-wide">Gardevoir <span class="text-fuchsia-200 font-light">Tracker</span></h1>
            </div>
            
            <div class="flex items-center gap-3 mt-4 md:mt-0 bg-fuchsia-900/50 p-2 rounded-xl border border-fuchsia-400/50 backdrop-blur-sm shadow-inner">
                <span class="text-2xl font-mono font-bold w-20 text-center" id="timer-display">50:00</span>
                <button onclick="startTimer()" class="bg-green-400 hover:bg-green-300 text-green-900 px-3 py-2 rounded-lg text-sm font-bold shadow transition-colors">▶</button>
                <button onclick="pauseTimer()" class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-3 py-2 rounded-lg text-sm font-bold shadow transition-colors">⏸</button>
                <button onclick="resetTimer()" class="bg-red-400 hover:bg-red-300 text-red-900 px-3 py-2 rounded-lg text-sm font-bold shadow transition-colors">⏹</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 glass-panel p-6 rounded-2xl shadow-xl border border-fuchsia-100 h-fit">
            <div class="bg-fuchsia-100 text-fuchsia-800 text-xs font-bold px-3 py-1 rounded-full w-fit mb-4">MI MAZO: GARDEVOIR EX</div>
            <h2 class="text-2xl font-black mb-6 text-fuchsia-900">Nueva Partida</h2>
            
            <div class="mb-8">
                <label class="block text-sm font-bold mb-2 text-gray-600">¿Contra qué jugaste?</label>
                <select id="opp-deck" class="w-full border-2 border-fuchsia-200 rounded-xl p-3 bg-white text-lg font-bold text-fuchsia-900 focus:outline-none focus:border-fuchsia-500 focus:ring-2 focus:ring-fuchsia-200 transition-all"></select>
            </div>

            <label class="block text-sm font-bold mb-2 text-gray-600">Resultado Final</label>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="addMatch('W')" class="bg-green-100 hover:bg-green-500 hover:text-white border border-green-300 hover:border-green-500 text-green-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">WIN</button>
                <button onclick="addMatch('L')" class="bg-red-100 hover:bg-red-500 hover:text-white border border-red-300 hover:border-red-500 text-red-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">LOSS</button>
                <button onclick="addMatch('T')" class="bg-gray-100 hover:bg-gray-500 hover:text-white border border-gray-300 hover:border-gray-500 text-gray-700 font-black text-lg py-3 rounded-xl transition-all shadow-sm">TIE</button>
            </div>
            
            <button onclick="clearHistory()" class="w-full text-red-400 hover:text-red-600 text-sm mt-4 font-bold transition-colors">⚠️ Borrar todo el historial</button>
        </div>

        <div class="lg:col-span-2">
            <div class="glass-panel p-8 rounded-2xl shadow-xl border border-fuchsia-100 mb-8 flex justify-between items-center bg-gradient-to-br from-white to-fuchsia-50">
                <div>
                    <h2 class="text-3xl font-black text-fuchsia-900">Rendimiento Total</h2>
                    <p class="text-fuchsia-600/80 font-bold mt-1" id="total-matches-text">0 partidas registradas</p>
                </div>
                <div class="text-right">
                    <p class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 to-purple-600 drop-shadow-sm" id="global-winrate">0%</p>
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mt-1">Winrate</p>
                </div>
            </div>

            <h3 class="text-2xl font-black mb-6 text-fuchsia-900 flex items-center gap-2">
                <svg class="w-6 h-6 text-fuchsia-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Análisis por Matchup
            </h3>
            
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                </div>
        </div>
    </main>

    <script>
        // --- BASE DE DATOS ACTUALIZADA A LIMITLESS TCG META ---
        // Se utilizan los artes oficiales de la Pokedex para asegurar que la web cargue rápido y no haya enlaces rotos.
        const metaDecks = [
            { id: 'draga', name: 'Dragapult ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/887.png' },
            { id: 'garde', name: 'Gardevoir ex (Mirror)', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/282.png' },
            { id: 'grimmsnarl', name: "Marnie's Grimmsnarl ex", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/861.png' },
            { id: 'zoroark', name: "N's Zoroark ex", img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/571.png' },
            { id: 'gholdengo', name: 'Gholdengo ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1000.png' },
            { id: 'froslass', name: 'Froslass Munkidori', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/478.png' },
            { id: 'absol', name: 'Mega Absol Box', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/359.png' },
            { id: 'crustle', name: 'Crustle / Rock Inn', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/558.png' },
            { id: 'zard', name: 'Charizard ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png' },
            { id: 'ragingbolt', name: 'Raging Bolt ex', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1021.png' },
            { id: 'joltik', name: 'Joltik Box', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/595.png' },
            { id: 'other', name: 'Otro / Rogue Deck', img: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/132.png' } // Ditto para "Otros"
        ];

        let matches = JSON.parse(localStorage.getItem('gardeMatches')) || [];

        function init() {
            const oppDeckSelect = document.getElementById('opp-deck');
            metaDecks.forEach(deck => {
                oppDeckSelect.add(new Option(deck.name, deck.id));
            });
            updateUI();
        }

        function addMatch(result) {
            const oppDeck = document.getElementById('opp-deck').value;
            // Ya no guardamos "mi mazo" porque siempre es Gardevoir
            matches.push({ oppDeck, result, date: new Date().getTime() });
            localStorage.setItem('gardeMatches', JSON.stringify(matches));
            updateUI();
        }

        function clearHistory() {
            if(confirm('🚨 ¿Estás seguro de borrar TODAS tus partidas? No se puede deshacer.')) {
                matches = [];
                localStorage.removeItem('gardeMatches');
                updateUI();
            }
        }

        function updateUI() {
            const totalMatches = matches.length;
            const totalWins = matches.filter(m => m.result === 'W').length;
            const globalWinrate = totalMatches > 0 ? ((totalWins / totalMatches) * 100).toFixed(1) : 0;
            
            document.getElementById('global-winrate').innerText = globalWinrate + '%';
            document.getElementById('total-matches-text').innerText = `${totalMatches} partidas registradas`;

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';

            metaDecks.forEach(deck => {
                const deckMatches = matches.filter(m => m.oppDeck === deck.id);
                if (deckMatches.length === 0) return;

                const w = deckMatches.filter(m => m.result === 'W').length;
                const l = deckMatches.filter(m => m.result === 'L').length;
                const t = deckMatches.filter(m => m.result === 'T').length;
                const wr = ((w / deckMatches.length) * 100).toFixed(1);

                // Colores dinámicos según el Winrate
                let wrColor = 'text-gray-500';
                let borderColor = 'border-gray-200';
                if(wr >= 55) { wrColor = 'text-green-500'; borderColor = 'border-green-400'; }
                else if (wr < 45) { wrColor = 'text-red-500'; borderColor = 'border-red-400'; }
                else { wrColor = 'text-yellow-500'; borderColor = 'border-yellow-400'; }

                const card = document.createElement('div');
                card.className = `deck-card glass-panel rounded-2xl shadow-md p-4 flex items-center gap-4 border-l-8 ${borderColor} relative overflow-hidden`;
                
                // Fondo difuminado de la imagen para darle estilo
                card.innerHTML = `
                    <div class="absolute -right-6 -bottom-6 opacity-10 w-32 h-32 bg-contain bg-no-repeat z-0" style="background-image: url('${deck.img}')"></div>
                    
                    <img src="${deck.img}" alt="${deck.name}" class="w-20 h-20 object-contain bg-gradient-to-b from-white to-gray-100 rounded-full shadow-inner p-2 border border-gray-100 z-10 relative">
                    
                    <div class="flex-1 z-10 relative">
                        <h4 class="font-black text-lg text-fuchsia-950 leading-tight">${deck.name}</h4>
                        <div class="flex gap-3 text-sm mt-2 bg-white/50 w-fit px-2 py-1 rounded-lg">
                            <span class="text-green-600 font-bold">${w}W</span>
                            <span class="text-red-600 font-bold">${l}L</span>
                            <span class="text-gray-500 font-bold">${t}T</span>
                        </div>
                    </div>
                    
                    <div class="text-right z-10 relative">
                        <span class="block text-2xl font-black ${wrColor}">${wr}%</span>
                    </div>
                `;
                statsGrid.appendChild(card);
            });

            // Si no hay partidas, mostrar mensaje
            if(totalMatches === 0) {
                statsGrid.innerHTML = `
                    <div class="col-span-1 sm:col-span-2 text-center p-10 border-2 border-dashed border-fuchsia-300 rounded-2xl text-fuchsia-400 font-bold">
                        Aún no has registrado ninguna partida. ¡Juega tu primer match y añade el resultado!
                    </div>
                `;
            }
        }

        // --- TEMPORIZADOR ---
        let timerSeconds = 50 * 60;
        let timerInterval = null;

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) {
                    timerSeconds--;
                    updateTimerDisplay();
                } else {
                    pauseTimer();
                    alert("¡TIEMPO CUMPLIDO! Inicia el Turno 0.");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            pauseTimer();
            timerSeconds = 50 * 60;
            updateTimerDisplay();
        }

        window.onload = init;
    </script>
</body>
</html>
